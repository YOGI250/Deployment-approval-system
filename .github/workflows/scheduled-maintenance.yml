# Weekly "learn from real outcomes" job: retrains the RandomForest model
# and recalibrates data/risk_thresholds.json from real audit-log
# outcomes, then commits the results back to main. Runs
# app/scheduled_maintenance.py, which wraps train_model.py and
# adjust_thresholds.py -- see docs/SCHEDULED_MAINTENANCE.md.
#
# Lives here (GitHub Actions) rather than in the Azure DevOps demo
# pipeline (deployment-approval-demo) because this repo -- which holds
# train_model.py, adjust_thresholds.py, and data/model.pkl -- is what
# holds that code; the demo repo only triggers the per-deployment
# risk-check pipeline and doesn't contain any of this.
#
# NOTE: committing to main does NOT deploy to Azure -- that's currently
# a manual step (VS Code extension) that also needs an explicit App
# Service restart to take effect. See "Known gap" in
# docs/SCHEDULED_MAINTENANCE.md.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL  - same Neon Postgres connection string used by the app
#   GROQ_API_KEY  - only needed because risk_scorer.py (imported by
#                   adjust_thresholds.py) constructs a Groq client at
#                   import time; Groq is never actually called here.

name: Scheduled Maintenance

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC
  workflow_dispatch: {}    # allows a manual run from the Actions tab

permissions:
  contents: write   # needed to commit the updated model/thresholds back

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate synthetic deployment history baseline
        # data/deployment_history.csv is gitignored (generated, not
        # hand-written) so it isn't in the checkout. It's seeded
        # (random.seed(42)) so this always reproduces the same 500-row
        # baseline that train_model.py blends real outcomes on top of.
        working-directory: app
        run: python3 generate_deployment_history.py

      - name: Run scheduled maintenance
        working-directory: app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 scheduled_maintenance.py

      - name: Commit updated model/thresholds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/risk_thresholds.json data/model.pkl
          if ! git diff --cached --quiet; then
            git commit -m "Scheduled maintenance: retrain model + adjust thresholds [skip ci]"
            git push
          else
            echo "No changes to commit -- thresholds and model are unchanged."
          fi
