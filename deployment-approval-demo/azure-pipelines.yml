trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: risk-assistant-secrets

stages:

# =====================================================
# BUILD & TEST STAGE
# =====================================================
- stage: Build
  displayName: "Build and Test"

  jobs:
  - job: Build
    displayName: "Build, Test and Analyze"

    steps:

    - checkout: self
      fetchDepth: 0

    - script: |
        python3 -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

        pip install pytest pytest-cov requests
      displayName: "Install Dependencies"

    - script: |
        python3 -m pytest \
          tests \
          --junitxml=test-results.xml \
          --cov=. \
          --cov-report=xml:coverage.xml \
          --cov-report=term || true

        TESTS_FAILED=$(grep -o 'failures="[0-9]*"' test-results.xml | grep -o '[0-9]*')

        if [ -z "$TESTS_FAILED" ]; then
          TESTS_FAILED=0
        fi

        echo "Tests Failed: $TESTS_FAILED"

        echo "##vso[task.setvariable variable=testsFailed;isOutput=true]$TESTS_FAILED"
      name: testStep
      displayName: "Run Unit Tests"

    - script: |
        FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l)

        LINES_CHANGED=$(git diff --numstat HEAD~1 HEAD | awk '{sum+=$1+$2} END {print sum}')

        if [ -z "$LINES_CHANGED" ]; then
          LINES_CHANGED=0
        fi

        echo "Files Changed : $FILES_CHANGED"
        echo "Lines Changed : $LINES_CHANGED"

        echo "##vso[task.setvariable variable=filesChanged;isOutput=true]$FILES_CHANGED"
        echo "##vso[task.setvariable variable=linesChanged;isOutput=true]$LINES_CHANGED"
      name: gitStats
      displayName: "Analyze Git Changes"

    - script: |
        if [ ! -f coverage.xml ]; then
          echo "Coverage file not found."
          COVERAGE=0
        else
          COVERAGE=$(python3 - <<EOF
        import xml.etree.ElementTree as ET

        tree = ET.parse("coverage.xml")
        root = tree.getroot()

        print(round(float(root.attrib["line-rate"]) * 100))
        EOF
        )
        fi

        echo "Coverage = $COVERAGE"

        echo "##vso[task.setvariable variable=testCoverage;isOutput=true]$COVERAGE"
      name: coverageStep
      displayName: "Extract Test Coverage"

# =====================================================
# DEPLOY STAGE
# =====================================================
- stage: Deploy
  displayName: "Deploy to Production"

  dependsOn: Build

  variables:
    filesChanged: $[ stageDependencies.Build.Build.outputs['gitStats.filesChanged'] ]
    linesChanged: $[ stageDependencies.Build.Build.outputs['gitStats.linesChanged'] ]
    testsFailed: $[ stageDependencies.Build.Build.outputs['testStep.testsFailed'] ]
    testCoverage: $[ stageDependencies.Build.Build.outputs['coverageStep.testCoverage'] ]

  jobs:
  - deployment: DeployToProduction
    displayName: "Deploy to Production Environment"
    environment: production

    strategy:
      runOnce:
        deploy:
          steps:

          - script: |
              echo "==============================================="
              echo " Enterprise AI Deployment Approval Assistant"
              echo "==============================================="

              RESPONSE=$(curl -s -X POST "https://deployment-approval-demo-dgcxg9habkenhwes.centralindia-01.azurewebsites.net/predict" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $(API_KEY)" \
              -d "{
                \"deployment_id\":\"$(Build.BuildId)\",
                \"author\":\"$(Build.RequestedFor)\",
                \"team\":\"payments\",
                \"files_changed\":$(filesChanged),
                \"lines_changed\":$(linesChanged),
                \"test_coverage_pct\":$(testCoverage),
                \"tests_failed\":$(testsFailed),
                \"environment\":\"production\",
                \"day_of_week\":\"$(date +%a)\",
                \"hour\":$(date +%-H)
              }")

              echo ""
              echo "Raw API Response:"
              echo "$RESPONSE"
              echo ""

              RISK=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin)['risk_level'])")
              DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin)['decision'])")
              CONFIDENCE=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('confidence','N/A'))")
              MODEL=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('model','N/A'))")
              MODEL_VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('model_version','N/A'))")
              POLICY_OVERRIDE=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('policy_override',False))")
              POLICY_REASON=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('policy_reason','None'))")
              PROMPT_VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('prompt_version','N/A'))")
              TRIGGERED_POLICIES=$(echo "$RESPONSE" | python3 -c "import sys,json;print(', '.join(json.load(sys.stdin).get('triggered_policies',[])))")

              echo ""
              echo "====================================================="
              echo "          AI DEPLOYMENT RISK ANALYSIS"
              echo "====================================================="
              echo "Risk Level         : $RISK"
              echo "Decision           : $DECISION"
              echo "Confidence         : $CONFIDENCE"
              echo "ML Model           : $MODEL"
              echo "Model Version      : $MODEL_VERSION"
              echo "Prompt Version     : $PROMPT_VERSION"
              echo "Policy Override    : $POLICY_OVERRIDE"
              echo "Triggered Policies : $TRIGGERED_POLICIES"
              echo "Policy Reason      : $POLICY_REASON"
              echo "====================================================="
              echo ""

              if [ "$DECISION" = "reject" ]; then
                echo "##vso[task.logissue type=error]Deployment Blocked by AI Policy Engine"
                exit 1
              elif [ "$DECISION" = "delay" ]; then
                echo "##vso[task.logissue type=warning]Deployment Delayed by AI Policy Engine"
              else
                echo "Deployment Approved"
              fi
            displayName: "AI Risk Analysis"

          - script: |
              echo "======================================="
              echo "Deploying application..."
              echo "Deployment completed successfully."
              echo "======================================="
            displayName: "Deploy Application"

          - script: |
              echo "Waiting 20 seconds..."
              sleep 20

              HEALTH=$(curl -s https://deployment-approval-demo-dgcxg9habkenhwes.centralindia-01.azurewebsites.net/health)

              echo "Health Response:"
              echo "$HEALTH"

              STATUS=$(echo "$HEALTH" | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])")

              if [ "$STATUS" != "healthy" ]; then
                echo "Health Check Failed"
                exit 1
              fi

              echo "Application is Healthy."
            displayName: "Verify Deployment Health"

          - script: |
              echo "Recording deployment verification..."

              VERIFY=$(curl -s -X POST \
              "https://deployment-approval-demo-dgcxg9habkenhwes.centralindia-01.azurewebsites.net/deployment-verification" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $(API_KEY)" \
              -d "{
                \"deployment_id\":\"$(Build.BuildId)\",
                \"health_status\":\"healthy\",
                \"http_status_code\":200,
                \"health_check\":{
                  \"status\":\"healthy\",
                  \"message\":\"Deployment verified by Azure Pipeline\"
                }
              }")

              echo "Verification Response"
              echo "$VERIFY"
            displayName: "Record Deployment Verification"
